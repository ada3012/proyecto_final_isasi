<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastelitos</title>
    <link rel="stylesheet" href="./css/AM/index.css">
</head>
<body>
    <main-menu></main-menu>

    <div class="central" style=" text-align: center;">
        <h1>Bienvenidos a HARDWARE-CAKE</h1>
        <p>¡Disfruta de nuestros deliciosos pastelitos!</p>
    </div>
    

    <div class="div_central">

        <div class="div_img">
        <img src="./multimedia/assets/cake.png" alt="Pastelito" class="pastelito_img">
        </div>

        <div class="div_text">
            <p class="text_in">Descubre nuestra amplia selección de pastelitos artesanales, hechos con ingredientes de la más alta calidad.</p>
            <button class="boton_in" onclick="abrirModal()">Iniciar Sesión</button>
            <h5>No tienes cuenta? Regístrate <a href="./registro.html">aquí</a></h5
                >
        </div>

    </div>

    <!-- MODAL LOGIN -->
     <div id="modalLogin" class="modal">
        <div class="modal_contenido">
            <span class="cerrar" onclick="cerrarModal()">&times;</span>
            <h1 style="color: black;">Iniciar Sesión</h1>
            <input type="email" id="correo" placeholder="Correo"><br><br>
            <input type="password" id="contrasena" placeholder="Contraseña"><br><br>
            <button onclick="iniciarSesion()">Entrar</button>
        </div>
    </div>


    
    <script src="./js/AM/menu.js"></script>
    <script src="./js/AM/login.JS"></script>
</body>
</html>
